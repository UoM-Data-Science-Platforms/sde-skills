name: Deploy Astro App

on:
  push:
    branches:
      - main
    paths:
      - 'astro-app/**'
      - 'scripts/markdown_to_yaml.py'
      - 'scripts/extract_tools_tech_standards.py'
      - 'scripts/build_data.py'
      - 'docs/competency_framework/**'
      - 'yaml/**'
      - 'docs/index.md'
      - 'docs/about.md'
      - 'docs/contributing.md'
      - 'docs/assets/img/**'
      - '.github/workflows/deploy-astro.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked --all-extras --dev

      - name: Extract tools/technologies/standards from markdown
        run: uv run python scripts/extract_tools_tech_standards.py

      - name: Build and merge YAML data
        run: uv run python scripts/build_data.py

      - name: Copy home page markdown
        run: |
          mkdir -p astro-app/data/assets/img
          cp docs/index.md astro-app/data/index.md
          cp docs/about.md astro-app/data/about.md
          cp docs/contributing.md astro-app/data/contributing.md
          cp docs/competency_framework/overview.md astro-app/data/cf-overview.md
          cp docs/competency_framework/framework_mapping.md astro-app/data/cf-framework-mapping.md
          cp docs/assets/img/* astro-app/data/assets/img/

      - name: Set Astro deploy config
        run: |
          cat > astro-app/astro.config.mjs <<'EOF'
          import { defineConfig } from 'astro/config';
          import react from '@astrojs/react';
          import remarkMkdocsAttr from './src/plugins/remark-mkdocs-attr.js';
          export default defineConfig({
            integrations: [react()],
            markdown: {
              remarkPlugins: [remarkMkdocsAttr]
            },
            site: 'https://uom-data-science-platforms.github.io',
            base: '/sde-skills',
          });
          EOF

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: astro-app/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: astro-app

      - name: Build Astro app
        run: npm run build
        working-directory: astro-app

      - name: Add .nojekyll to dist
        run: touch astro-app/dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: astro-app/dist
          destination_dir: .
