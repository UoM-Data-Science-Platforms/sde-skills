domain:
  index: 1
  main-color: color-nhs-blue
  id: safe-access-identity
  name: Safe Access & Identity
  description: This domain covers all aspects of user authentication, authorization, and access control
    within Secure Data Environments, ensuring that only authorised users can access appropriate resources.
  source_file: safe_access_identity.md
  subdomains:
    identity-management:
      id: identity-management
      name: Identity Management
      description: Identity Management encompasses the systems and processes that govern user digital
        identities within secure data environments. This subdomain covers the complete lifecycle of authentication
        credentials, from verification mechanisms and account provisioning to cross-organisational federation,
        ensuring that only properly authenticated users can access sensitive research data while maintaining
        security, operational efficiency, and compliance with organisational policies.
      competencies:
        authentication-systems:
          id: authentication-systems
          name: Authentication Systems
          description: Implements and maintains secure user verification mechanisms within research environments.
            Involves designing and configuring authentication protocols, password policies, and MFA solutions
            while troubleshooting security incidents. Requires the ability to evaluate technologies and
            architect enterprise-wide authentication strategies aligned with organisational security needs.
          levels:
            entry:
              id: authentication-systems-entry
              name: Entry Level
              skills:
              - Understands basic authentication concepts and mechanisms (e.g. AD/Entra, kerberos, oauth2/OIDC)
              - Familiar with password best practice and multi-factor authentication
              - Can configure user accounts in identity systems under supervision
              - Can understand existing SDE security Matrix.
            mid:
              id: authentication-systems-mid
              name: Mid Level
              skills:
              - Implements and configure secure authentication systems (e.g SDE security matrix, microsoft
                entra)
              - Implements MFA solutions appropriate to security requirements
              - Troubleshoots authentication issues and security incidents
              - Can modify existing SDE security matrix
            senior:
              id: authentication-systems-senior
              name: Senior Level
              skills:
              - Consult on enterprise authentication strategies.
              - Evaluates and selects authentication technologies aligned with security needs
              - Leads identity system transformations and security enhancements
              - Lead and provide support for existing Security Matrix.
        user-provisioning-lifecycle:
          id: user-provisioning-lifecycle
          name: User Provisioning & Lifecycle
          description: Manages the complete lifecycle of user accounts from creation to deactivation within
            secure environments. Encompasses designing and automating provisioning processes, ensuring
            compliance with management policies, and establishing governance frameworks that support efficient
            identity management across the organisation.
          levels:
            entry:
              id: user-provisioning-lifecycle-entry
              name: Entry Level
              skills:
              - Understands user account lifecycle stages
              - Familiar with provisioning and deprovisioning processes
              - Can execute account management tasks following established procedures
              - Understand existing user provisioning specification.
            mid:
              id: user-provisioning-lifecycle-mid
              name: Mid Level
              skills:
              - Designs and implements user lifecycle management processes
              - Develops automation for provisioning and deprovisioning
              - Ensures compliance with account management policies
              - Can modify/troubleshoot existing user provisioning specification queries
            senior:
              id: user-provisioning-lifecycle-senior
              name: Senior Level
              skills:
              - Can identify and implement appropriate user lifecycle governance frameworks
              - Implements advanced identity governance and administration solutions
              - Leads identity management modernization initiatives
              - Can lead new user provisioning specification implementation and support
        federated-identity-management:
          id: federated-identity-management
          name: Federated Identity Management
          description: Enables secure authentication across organisational boundaries through single sign-on
            protocols like SAML, OAuth, and OIDC. Involves configuring and managing federation with multiple
            identity providers, troubleshooting security issues, and developing governance frameworks
            to enhance secure collaboration between healthcare organisations and research institutions.
          levels:
            entry:
              id: federated-identity-management-entry
              name: Entry Level
              skills:
              - Understands basic concepts of federated identity
              - Familiar with SSO protocols (SAML, OAuth, OIDC)
              - Can configure simple federated identity integrations
            mid:
              id: federated-identity-management-mid
              name: Mid Level
              skills:
              - Implements federated identity solutions across systems
              - Configures and manages federation with multiple identity providers
              - Troubleshoots federation issues and security concerns
            senior:
              id: federated-identity-management-senior
              name: Senior Level
              skills:
              - Architects complex federated identity solutions across organisational boundaries
              - Develops federation governance and security frameworks
              - Leads initiatives to enhance identity federation capabilities across healthcare organisations
                and research institutions
    access-control:
      id: access-control
      name: Access Control
      description: Access Control ensures that only authorised individuals can access specific resources
        within secure data environments through structured permission systems. This subdomain covers role-based
        and attribute-based access models as well as least privilege implementation, providing robust
        security frameworks that enforce authorization policies while balancing operational requirements
        and minimizing access risks across research environments.
      competencies:
        role-based-access-control:
          id: role-based-access-control
          name: Role-Based Access Control
          description: Implements access permissions based on organizational roles within secure data
            environments. Involves defining appropriate roles, designing organizational role structures,
            implementing management processes, and conducting reviews. Requires skills to develop enterprise
            frameworks and optimise role structures to minimise access risks while meeting business needs.
          levels:
            entry:
              id: role-based-access-control-entry
              name: Entry Level
              skills:
              - Understands RBAC concepts and principles
              - Familiar with role definition and assignment processes
              - Can implement basic role assignments following established patterns
              - Can understand existing Role definitions
            mid:
              id: role-based-access-control-mid
              name: Mid Level
              skills:
              - Implements role structures appropriate to organisational needs
              - Implements role management and governance processes
              - Conducts role reviews and recommends improvements
              - Can modify/troubleshoot existing Role definitions queries.
            senior:
              id: role-based-access-control-senior
              name: Senior Level
              skills:
              - Develops enterprise RBAC frameworks and strategies
              - Implements advanced access governance and role mining
              - Leads initiatives to optimise role structures and reduce access risk
              - Can lead new Role definitions implementation and support.
        attribute-based-access-control:
          id: attribute-based-access-control
          name: Attribute-Based Access Control
          description: Implements dynamic, context-aware access control using attributes rather than roles.
            Requires defining policies based on various attribute types, designing controls for different
            contexts, evaluating their effectiveness, and developing advanced policy models for complex
            scenarios. Involves leading initiatives to implement dynamic access management across the
            organisation.
          levels:
            entry:
              id: attribute-based-access-control-entry
              name: Entry Level
              skills:
              - Understands ABAC concepts and use cases
              - Familiar with policy definition and attribute types
              - Can implement simple attribute-based policies
            mid:
              id: attribute-based-access-control-mid
              name: Mid Level
              skills:
              - Designs complex ABAC policies for different contexts
              - Implements attribute management and policy enforcement
              - Evaluates effectiveness of attribute-based controls
            senior:
              id: attribute-based-access-control-senior
              name: Senior Level
              skills:
              - Architects enterprise ABAC strategies and frameworks
              - Develops advanced policy models for complex authorization scenarios
              - Leads initiatives to implement dynamic access control
        least-privilege-implementation:
          id: least-privilege-implementation
          name: Least Privilege Implementation
          description: Ensures users and systems have only the minimum access privileges needed for their
            functions. Involves identifying excessive permissions, implementing appropriate access models,
            conducting reviews, and designing attestation processes. Requires developing enterprise-wide
            strategies and implementing tools to maintain effective privilege governance throughout the
            organisation.
          levels:
            entry:
              id: least-privilege-implementation-entry
              name: Entry Level
              skills:
              - Understands the principle of least privilege
              - Familiar with privilege management concepts
              - Can identify excessive permissions in simple scenarios
              - Understand existing role-level security
            mid:
              id: least-privilege-implementation-mid
              name: Mid Level
              skills:
              - Implements least privilege access models across systems
              - Conducts privilege reviews and recommends right-sizing
              - Designs processes for regular privilege attestation
              - Support existing role-level security policy
            senior:
              id: least-privilege-implementation-senior
              name: Senior Level
              skills:
              - Develops enterprise privilege management strategies
              - Implements advanced tools for privilege discovery and management
              - Leads initiatives to mature privilege governance practices
              - Leads audit, implementation involving role-level security.
    secure-user-experience:
      id: secure-user-experience
      name: Secure User Experience
      description: Secure User Experience focuses on designing and maintaining protected research environments
        that balance robust security measures with usability. This subdomain encompasses researcher onboarding
        processes, protected workspace implementation, and secure collaboration platforms, enabling efficient
        work with sensitive healthcare data while ensuring appropriate controls that maintain compliance,
        data protection, and positive user experiences.
      competencies:
        researcher-onboarding:
          id: researcher-onboarding
          name: Researcher Onboarding
          description: Designs and implements secure processes for integrating researchers into data environments.
            Involves verifying training and certifications, creating efficient workflows, implementing
            credential verification, and establishing governance frameworks. Requires developing cross-organisational
            strategies that enhance both security and researcher experience.
          levels:
            entry:
              id: researcher-onboarding-entry
              name: Entry Level
              skills:
              - Understands researcher onboarding requirements and processes
              - Familiar with training and certification verification
              - Can execute onboarding steps following established procedures
            mid:
              id: researcher-onboarding-mid
              name: Mid Level
              skills:
              - Designs researcher onboarding workflows and documentation
              - Implements verification systems for researcher credentials
              - optimises onboarding processes for efficiency and security
            senior:
              id: researcher-onboarding-senior
              name: Senior Level
              skills:
              - Establishes enterprise researcher governance frameworks
              - Develops cross-organisational onboarding strategies
              - Leads initiatives to enhance researcher experience and security
        secure-research-workspaces:
          id: secure-research-workspaces
          name: Secure Research Workspaces
          description: Creates and maintains protected environments for researchers working with sensitive
            data. Involves designing secure environments tailored to research needs, implementing isolation
            controls, troubleshooting issues, and optimizing user experience. Requires evaluating technologies
            and leading modernization initiatives to enhance security while supporting research activities.
          levels:
            entry:
              id: secure-research-workspaces-entry
              name: Entry Level
              skills:
              - Understands secure workspace concepts and components
              - Familiar with workspace provisioning processes
              - Can configure basic workspace settings following templates
              - Understand current Research workspace
            mid:
              id: secure-research-workspaces-mid
              name: Mid Level
              skills:
              - Designs secure workspace environments for different research needs
              - Implements workspace isolation and security controls
              - Troubleshoots workspace issues and optimises user experience
              - Support existing current Research workspace including installing new software and applications,
                configuring existing applications, online services whitelisting
            senior:
              id: secure-research-workspaces-senior
              name: Senior Level
              skills:
              - leads development of workspace strategies
              - Evaluates and selects secure workspace technologies
              - Leads workspace modernization and security enhancement initiatives
              - Leads and support new/existing Research workspace
        secure-collaboration-tools:
          id: secure-collaboration-tools
          name: Secure Collaboration Tools
          description: Implements platforms enabling researchers to securely share and collaborate on
            sensitive data. Involves configuring security features, designing controls for data sharing,
            and evaluating tools for compliance. Requires developing cross-environment strategies, establishing
            governance frameworks, and enhancing collaborative capabilities while maintaining strong security
            standards.
          levels:
            entry:
              id: secure-collaboration-tools-entry
              name: Entry Level
              skills:
              - Understands secure collaboration requirements in research environments
              - Familiar with collaboration tool security features
              - Can configure basic sharing and access controls
              - Knowledge of any secret cloud service provider e.g azure kevaults
              - Knowledge of simple collaborative platforms
            mid:
              id: secure-collaboration-tools-mid
              name: Mid Level
              skills:
              - Implements secure collaboration platforms and integrations
              - Designs security controls for data sharing and communication
              - Evaluates collaboration tools for security and compliance
              - Support/create/maintain secrets using cloud services.
            senior:
              id: secure-collaboration-tools-senior
              name: Senior Level
              skills:
              - Develops secure collaboration strategies across research environments
              - Implements governance frameworks for secure information sharing
              - Leads initiatives to enhance collaboration capabilities while maintaining security
              - Leads task/communication management on collaborative platforms.
