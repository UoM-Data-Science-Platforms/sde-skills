domain:
  index: 4
  main-color: color-nhs-blue
  id: safe-outputs-disclosure-control
  name: Safe Outputs & Disclosure Control
  description: This domain covers the technical controls that help to protect projects from accidental
    or intentional disclosure, as well as providing tooling to support disclosure review operations of
    project teams to ensure that research outputs from Secure Data Environments do not inadvertently disclose
    sensitive information.
  source_file: safe_outputs_disclosure_control.md
  subdomains:
    output-checking:
      id: output-checking
      name: Output Checking
      description: This subdomain focuses on providing output checkers with tools that facilitate structured
        review processes for different output formats, and developing decision support systems that ensure
        consistent application of disclosure control rules while maintaining appropriate governance and
        traceability.
      competencies:
        output-review-processes:
          id: output-review-processes
          name: Output Review Processes
          description: Involves understanding review requirements for different output formats, designing
            workflows, implementing tracking and governance processes.
          levels:
            entry:
              id: output-review-processes-entry
              name: Entry Level
              skills:
              - Understands output review requirements and processes
              - Familiar with common output formats and their risks
            mid:
              id: output-review-processes-mid
              name: Mid Level
              skills:
              - Implements output tracking and audit logs to support governance processes
    technologiestools:
      id: technologiestools
      name: Technologies/Tools
      description: 'Awareness of output formats (e.g., CSV, PDF), basic audit logs

        Output tracking systems, audit trail tools (e.g., ELK Stack)

        Governance platforms, enterprise disclosure review systems



        ## Tools and platforms to support output checking'
      competencies: {}
    tools-and-platforms-to-support-output-checking:
      id: tools-and-platforms-to-support-output-checking
      name: Tools and platforms to support output checking
      description: "### Workflow engines\nDeploy and administer workflow engines to help ensure consistency,\
        \ reliability, and traceability of output checking processes. Create individual workflow that\
        \ meet governance and legal requirements for project teams.\n\n=== \":material-battery-10: Entry\
        \ Level\"\n\n    - is aware of workflow engines and the functionality they provide\n    - is aware\
        \ of actors and stages in the disclosure review process\n    - can administer workflow engines\
        \ to make changes to existing disclosure review workflows\n\n=== \":material-battery-50: Mid Level\"\
        \n\n    - can assess suitability of workflow engines for achieving desired functionality\n   \
        \ - can work with project stakeholder to design workflows that address local policy and governance/regulatory\
        \ stipulations\n    - can administer workflow engines to implement disclosure review workflows\n\
        \    - can develop and maintain workflow templates so maximize reuse across similar governance\
        \ constraints\n\n=== \":material-battery-90: Senior Level\"\n\n    - Leads the technology strategy\
        \ for business process management\n\n\n## Technologies/Tools\n\nCamunda, Apache Airflow (basic\
        \ admin), BPMN viewers\nCamunda Modeler, custom workflow templates, stakeholder-driven design\n\
        Enterprise BPM platforms (e.g., Bonita, Bizagi), strategic workflow architecture"
      competencies:
        workflow-engines:
          id: workflow-engines
          name: Workflow engines
          description: Deploy and administer workflow engines to help ensure consistency, reliability,
            and traceability of output checking processes. Create individual workflow that meet governance
            and legal requirements for project teams.
          levels:
            entry:
              id: workflow-engines-entry
              name: Entry Level
              skills:
              - is aware of workflow engines and the functionality they provide
              - is aware of actors and stages in the disclosure review process
              - can administer workflow engines to make changes to existing disclosure review workflows
            mid:
              id: workflow-engines-mid
              name: Mid Level
              skills:
              - can assess suitability of workflow engines for achieving desired functionality
              - can work with project stakeholder to design workflows that address local policy and governance/regulatory
                stipulations
              - can administer workflow engines to implement disclosure review workflows
              - can develop and maintain workflow templates so maximize reuse across similar governance
                constraints
            senior:
              id: workflow-engines-senior
              name: Senior Level
              skills:
              - Leads the technology strategy for business process management
    statistical-disclosure-control:
      id: statistical-disclosure-control
      name: Statistical Disclosure Control
      description: Implementing automated systems that enforce consistent application of disclosure controls
        across varied research outputs while maintaining statistical validity.
      competencies:
        disclosure-risk-assessment:
          id: disclosure-risk-assessment
          name: Disclosure Risk Assessment
          description: Implementing tools to facilitate reviewing research outputs for potential privacy
            violations and re-identification risks. Has an awareness of different types of disclosure
            risks (identity and attribute), recommending appropriate controls.
          levels:
            entry:
              id: disclosure-risk-assessment-entry
              name: Entry Level
              skills:
              - Understands basic disclosure risk concepts (re-identification risks, data sensitivity
                levels)
              - Familiar with common types of disclosure risks (identity, attribute)
            mid:
              id: disclosure-risk-assessment-mid
              name: Mid Level
              skills:
              - Recommends appropriate controls based on risk assessment
            senior:
              id: disclosure-risk-assessment-senior
              name: Senior Level
              skills:
              - Leads initiatives to enhance disclosure risk management (e.g., implementing new tools
                or techniques, anticipate introduction of new regulatory frameworks).
    accidental-disclosure:
      id: accidental-disclosure
      name: Accidental disclosure
      description: ''
      competencies: {}
    emergency-response:
      id: emergency-response
      name: Emergency response
      description: ''
      competencies: {}
