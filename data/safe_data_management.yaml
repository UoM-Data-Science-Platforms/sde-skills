domain:
  index: 2
  main-color: color-deep-blue
  id: safe-data-management
  name: Safe Data Management
  description: This domain covers all aspects of data handling, processing, governance, and engineering
    within Secure Data Environments, focusing on ensuring data is managed securely and effectively throughout
    its lifecycle.
  source_file: safe_data_management.md
  subdomains:
    data-governance:
      id: data-governance
      name: Data Governance
      description: 'Data Governance establishes frameworks and processes for ensuring data quality, security,
        and proper management throughout its lifecycle.

        This subdomain encompasses classification of sensitive data, tracking data lineage and provenance,
        and implementing quality management practices that maintain data integrity, accuracy, and compliance
        with organisational policies while providing visibility into data origins and transformations.'
      competencies:
        data-integrity:
          id: data-integrity
          name: Data Integrity
          description: 'Ensures that data remains accurate, consistent, and unaltered throughout its lifecycle.

            Involves implementing mechanisms such as checksums, hash validation, and digital signatures
            to detect and prevent unauthorised modification or corruption.

            Requires regular integrity checks, monitoring, and alerting, as well as procedures for remediation
            in the event of integrity violations.'
          levels:
            entry:
              id: data-integrity-entry
              name: Entry Level
              skills:
              - Understands the importance of data integrity in secure environments
              - Familiar with basic integrity verification methods (e.g., checksums)
              - Can perform manual integrity checks under supervision
            mid:
              id: data-integrity-mid
              name: Mid Level
              skills:
              - Implements automated data integrity verification processes
              - Monitors and responds to integrity check failures
              - Integrates integrity validation into data pipelines and storage workflows
            senior:
              id: data-integrity-senior
              name: Senior Level
              skills:
              - Designs and oversees enterprise-wide data integrity strategies
              - Establishes policies and procedures for ongoing integrity assurance
              - Leads incident response for data integrity breaches
    technologiestools:
      id: technologiestools
      name: Technologies/Tools
      description: 'Checksums, manual validation tools

        Automated integrity verification (e.g., hash checks), monitoring tools

        Enterprise integrity frameworks, digital signature systems'
      competencies:
        data-cataloguing-discovery:
          id: data-cataloguing-discovery
          name: Data Cataloguing & Discovery
          description: 'Creates and maintains systems that enable researchers to find and understand available
            datasets in line with FAIR (Findable, Accessible, Interoperable, and Reusable) principles.

            Involves documenting datasets with appropriate metadata, implementing catalogue systems, developing
            metadata standards, ensuring catalogue accuracy and usability, and architecting enterprise
            discovery solutions.

            Requires establishing governance frameworks and enhancing data reusability.'
          levels:
            entry:
              id: data-cataloguing-discovery-entry
              name: Entry Level
              skills:
              - Understands the purpose and structure of data catalogues
              - Familiar with metadata standards and practices
              - Familiar with common data cataloguing tools
            mid:
              id: data-cataloguing-discovery-mid
              name: Mid Level
              skills:
              - Implements and maintains data catalogue systems
              - Develops metadata standards and collection processes
            senior:
              id: data-cataloguing-discovery-senior
              name: Senior Level
              skills:
              - Architects enterprise-wide data catalogue implementations
              - Establishes governance frameworks for metadata management
              - Leads initiatives to enhance data discovery and reuse
    data-engineering-processing:
      id: data-engineering-processing
      name: Data Engineering & Processing
      description: 'Data Engineering & Processing focuses on building and maintaining secure systems that
        extract, transform, store, and process sensitive data.

        This subdomain covers the development of secure data pipelines, management of database systems,
        implementation of structured data models and healthcare standards, and processing methodologies
        that ensure data is securely handled throughout workflows while maintaining appropriate levels
        of performance and reliability.'
      competencies:
        data-pipeline-development:
          id: data-pipeline-development
          name: Data Pipeline Development
          description: 'Builds and maintains processes that extract, transform, and load data securely
            between systems.

            Involves developing ETL processes, designing secure pipelines for various data types, implementing
            error handling, monitoring data flows, and optimising performance.

            Requires architecting complex systems at enterprise scale and establishing best practices
            for secure data processing.'
          levels:
            entry:
              id: data-pipeline-development-entry
              name: Entry Level
              skills:
              - Familiar with data pipeline concepts and components
              - Can develop simple ETL processes under supervision
              - Understands data transformation and loading techniques
            mid:
              id: data-pipeline-development-mid
              name: Mid Level
              skills:
              - Designs and implements secure data pipelines for various data types
              - Develops error handling and monitoring for data flows
              - Optimises pipeline performance and resource usage
            senior:
              id: data-pipeline-development-senior
              name: Senior Level
              skills:
              - Architects complex data pipeline systems at enterprise scale
              - Establishes best practices and patterns for secure data processing
              - Leads pipeline modernisation and optimisation initiatives
